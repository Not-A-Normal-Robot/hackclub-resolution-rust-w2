name: Publish Release

permissions:
  contents: read

on:
  push:
    # tags:
    #   - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl,x86_64-pc-windows-gnu,aarch64-unknown-linux-gnu,aarch64-unknown-linux-musl,aarch64-pc-windows-gnullvm,armv7-unknown-linux-gnueabihf,armv7-unknown-linux-musleabihf
          rustflags: ""
      - name: Release
        uses: softprops/action-gh-release@v2